[pytest]
# ─── Digipay E2E Test Suite — pytest configuration ───────────────────────────
testpaths          = tests
python_files       = test_*.py
python_classes     = Test*
python_functions   = test_*
pythonpath         = . tests


# Output
addopts =
    -v
    --tb=short
    --strict-markers
    --json-report
    --json-report-file=.test-results/report.json
    --json-report-indent=2
    -p no:warnings

# Custom markers
markers =
    functionality: Functional/UI behaviour tests
    vulnerability: Security and vulnerability tests
    unit:          Unit-level component / DOM tests
    slow:          Tests that take more than 5 seconds
    auth:          Authentication flow tests
    dashboard:     Dashboard portal tests

# Timeout (seconds) per test
timeout = 60

# Log settings
log_cli            = true
log_cli_level      = INFO
log_cli_format     = %(asctime)s [%(levelname)s] %(message)s
log_date_format    = %Y-%m-%d %H:%M:%S
